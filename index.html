<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLhouse Vinyl BPM Counter</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #121212;
      --display: #000000;
      --text: #eaeaea;
      --muted: #888;
      --accent: #ff3b3b;
      --accent-dark: #a80000;
      --line: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #111, #000);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #141414, #0a0a0a);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      font-size: 20px;
      letter-spacing: 2px;
      margin-bottom: 18px;
      color: var(--muted);
    }

    .display {
      background: var(--display);
      border: 2px solid #222;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }

    .bpm {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    .tap {
      width: 100%;
      height: 140px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(180deg, #ff3b3b, #a80000);
      color: white;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(255,0,0,0.4);
      margin-bottom: 14px;
    }

    .tap:active {
      transform: scale(0.97);
      background: linear-gradient(180deg, #ff5c5c, #c40000);
    }

    .reset {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #1a1a1a;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>CLHOUSE VINYL BPM COUNTER</h1>

    <div class="display">
      <div class="bpm" id="bpm">--</div>
      <div class="label" id="info">Tap starten</div>
    </div>

    <button class="tap" id="tap">TAP</button>
    <button class="reset" id="reset">RESET</button>

    <div class="hint">Mehrmals im Beat tippen (4–8 Taps)</div>
  </div>

  <script>
    const tapBtn = document.getElementById('tap');
    const resetBtn = document.getElementById('reset');
    const bpmEl = document.getElementById('bpm');
    const infoEl = document.getElementById('info');

    let taps = [];

    function reset() {
      taps = [];
      bpmEl.textContent = '--';
      infoEl.textContent = 'Reset';
    }

    function calc() {
      if (taps.length < 2) {
        infoEl.textContent = taps.length + ' Tap';
        return;
      }

      const intervals = [];
      for (let i = 1; i < taps.length; i++) {
        intervals.push(taps[i] - taps[i - 1]);
      }

      const avg = intervals.reduce((a, b) => a + b) / intervals.length;
      const bpm = Math.round(60000 / avg);

      bpmEl.textContent = bpm;
      infoEl.textContent = taps.length + ' Taps';
    }

    tapBtn.addEventListener('click', () => {
      const now = Date.now();

      if (taps.length && now - taps[taps.length - 1] > 2000) {
        taps = [];
      }

      taps.push(now);

      if (taps.length > 8) taps.shift();

      calc();
    });

    resetBtn.addEventListener('click', reset);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        tapBtn.click();
      }
    });
  </script>
</body>
</html>
